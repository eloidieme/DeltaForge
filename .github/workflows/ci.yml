name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo check --release
      - run: cargo clippy --release --all-targets -- -D warnings
      - name: Run cargo test
        timeout-minutes: 15
        shell: bash
        run: |
          set +e
          cargo test 2>&1 | tee cargo-test.log
          test_status=${PIPESTATUS[0]}
          set -e
          if [ "$test_status" -ne 0 ]; then
            details=$(grep -E 'test .* \.\.\. FAILED|panicked at|assertion .* failed|left:|right:|expected stdout|[0-9]+ passed, [0-9]+ failed|timed out|another DeltaForge|error:' cargo-test.log | tail -n 20 | tr '\r\n' '  ')
            if [ -z "$details" ]; then
              details="cargo test failed; inspect the job log"
            fi
            echo "::error title=Rust test failure::$details"
            exit "$test_status"
          fi
      - run: cargo run -- validate-pack --strict
