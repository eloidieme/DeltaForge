tests:
  - name: writes one log entry
    command: ["write-log", "{temp_dir}/store.log", "alpha", "one"]
    expect:
      exit_code: 0
      file_exists:
        - "{temp_dir}/store.log"
      file_contains:
        - path: "{temp_dir}/store.log"
          contains: "SET alpha one"

  - name: creates nested parent directory
    command: ["write-log", "{temp_dir}/data/store.log", "beta", "two"]
    expect:
      exit_code: 0
      file_exists:
        - "{temp_dir}/data/store.log"

  - name: prints written marker
    command: ["write-log", "{temp_dir}/store.log", "gamma", "three"]
    expect:
      exit_code: 0
      stdout_contains:
        - "wrote"

  - name: appends after existing records and preserves spaces
    fixture: existing_store
    command: ["write-log", "{fixture_path}/store.log", "title", "hello world"]
    expect:
      exit_code: 0
      file_contains:
        - path: "{temp_dir}/fixture/store.log"
          contains: |
            SET alpha one
            SET title hello world
