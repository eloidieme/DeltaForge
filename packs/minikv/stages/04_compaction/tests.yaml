tests:
  - name: writes latest value for each key
    fixture: stale_store
    command: ["compact", "{fixture_path}/store.log", "{temp_dir}/compact.log"]
    expect:
      exit_code: 0
      file_contains:
        - path: "{temp_dir}/compact.log"
          contains: |
            SET alpha three
            SET beta two

  - name: removes superseded values
    fixture: stale_store
    command: ["compact", "{fixture_path}/store.log", "{temp_dir}/compact.log"]
    expect:
      exit_code: 0
      file_not_contains:
        - path: "{temp_dir}/compact.log"
          contains: "SET alpha one"

  - name: reports compacted marker
    fixture: stale_store
    command: ["compact", "{fixture_path}/store.log", "{temp_dir}/compact.log"]
    expect:
      exit_code: 0
      stdout_contains:
        - "compacted"

  - name: malformed input produces no compacted state
    fixture: malformed_store
    command: ["compact", "{fixture_path}/store.log", "{temp_dir}/compact.log"]
    expect:
      exit_code: 1
      file_not_exists:
        - "{temp_dir}/compact.log"
