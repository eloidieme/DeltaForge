tests:
  - name: reports entries and live keys
    fixture: stats_store
    command: ["stats", "{fixture_path}/store.log"]
    expect:
      exit_code: 0
      stdout_contains:
        - "entries: 4"
        - "live_keys: 2"

  - name: reports tombstones
    fixture: stats_store
    command: ["stats", "{fixture_path}/store.log"]
    expect:
      exit_code: 0
      stdout_contains:
        - "tombstones: 1"

  - name: stats output is line oriented
    fixture: stats_store
    command: ["stats", "{fixture_path}/store.log"]
    expect:
      exit_code: 0
      regex_match:
        - "(?m)^live_keys: [0-9]+$"

  - name: repeated operations count physically but latest state wins
    fixture: repeated_store
    command: ["stats", "{fixture_path}/store.log"]
    expect:
      exit_code: 0
      stdout_exact: |
        entries: 5
        live_keys: 1
        tombstones: 2

  - name: blank log reports zero counters
    fixture: blank_store
    command: ["stats", "{fixture_path}/store.log"]
    expect:
      exit_code: 0
      stdout_exact: |
        entries: 0
        live_keys: 0
        tombstones: 0

  - name: malformed history is not counted silently
    fixture: malformed_store
    command: ["stats", "{fixture_path}/store.log"]
    expect:
      exit_code: 1
      stderr_contains:
        - "malformed"
