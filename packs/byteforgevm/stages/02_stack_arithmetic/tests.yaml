tests:
  - name: runs addition
    fixture: arithmetic
    command: ["run", "{fixture_path}/add.bvm"]
    expect:
      exit_code: 0
      stdout_exact: "7\n"

  - name: runs multiplication
    fixture: arithmetic
    command: ["run", "{fixture_path}/mul.bvm"]
    expect:
      exit_code: 0
      stdout_exact: "42\n"

  - name: handles subtraction order
    fixture: arithmetic
    command: ["run", "{fixture_path}/sub.bvm"]
    expect:
      exit_code: 0
      stdout_exact: "6\n"
