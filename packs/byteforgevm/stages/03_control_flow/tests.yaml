tests:
  - name: jump skips instructions
    fixture: control
    command: ["run", "{fixture_path}/jump.bvm"]
    expect:
      exit_code: 0
      stdout_exact: "9\n"

  - name: jump can land on halt
    fixture: control
    command: ["run", "{fixture_path}/jump_to_halt.bvm"]
    expect:
      exit_code: 0
      stdout_exact: ""
