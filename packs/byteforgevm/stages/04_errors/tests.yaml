tests:
  - name: unknown opcode fails clearly
    fixture: errors
    command: ["run", "{fixture_path}/unknown.bvm"]
    expect:
      exit_code: 1
      stderr_contains:
        - "unknown opcode"

  - name: stack underflow fails clearly
    fixture: errors
    command: ["run", "{fixture_path}/underflow.bvm"]
    expect:
      exit_code: 1
      stderr_contains:
        - "stack underflow"

  - name: bad jump fails clearly
    fixture: errors
    command: ["run", "{fixture_path}/bad_jump.bvm"]
    expect:
      exit_code: 1
      stderr_contains:
        - "invalid jump"

  - name: negative jump fails clearly
    fixture: errors
    command: ["run", "{fixture_path}/negative_jump.bvm"]
    expect:
      exit_code: 1
      stderr_contains:
        - "invalid jump"

  - name: missing operand fails clearly
    fixture: errors
    command: ["run", "{fixture_path}/missing_operand.bvm"]
    expect:
      exit_code: 1
      stderr_contains:
        - "missing argument"

  - name: malformed integer operand fails clearly
    fixture: errors
    command: ["run", "{fixture_path}/bad_operand.bvm"]
    expect:
      exit_code: 1
      stderr_contains:
        - "invalid argument"
