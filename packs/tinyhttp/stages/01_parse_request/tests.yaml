tests:
  - name: parses get request line
    stdin: "GET /index.html HTTP/1.1\r\nHost: example.test\r\n\r\n"
    command: ["parse"]
    expect:
      exit_code: 0
      stdout_exact: |
        method: GET
        path: /index.html
        version: HTTP/1.1

  - name: parses post request line
    stdin: "POST /submit HTTP/1.0\r\n\r\n"
    command: ["parse"]
    expect:
      exit_code: 0
      stdout_exact: |
        method: POST
        path: /submit
        version: HTTP/1.0

  - name: parses request file form
    fixture: request_files
    command: ["parse", "{fixture_path}/request.http"]
    expect:
      exit_code: 0
      stdout_exact: |
        method: GET
        path: /from-file
        version: HTTP/1.1
