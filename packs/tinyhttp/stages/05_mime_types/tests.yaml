tests:
  - name: html files use text html
    fixture: mime_site
    command: ["serve-file", "{fixture_path}/public", "/index.html"]
    expect:
      exit_code: 0
      stdout_contains:
        - "Content-Type: text/html"

  - name: json files use application json
    fixture: mime_site
    command: ["serve-file", "{fixture_path}/public", "/data.json"]
    expect:
      exit_code: 0
      stdout_contains:
        - "Content-Type: application/json"

  - name: unknown files use octet stream
    fixture: mime_site
    command: ["serve-file", "{fixture_path}/public", "/asset.bin"]
    expect:
      exit_code: 0
      stdout_contains:
        - "Content-Type: application/octet-stream"

  - name: text files use text plain
    fixture: mime_site
    command: ["serve-file", "{fixture_path}/public", "/notes.txt"]
    expect:
      exit_code: 0
      stdout_contains:
        - "Content-Type: text/plain"

  - name: extensionless files use octet stream
    fixture: mime_site
    command: ["serve-file", "{fixture_path}/public", "/LICENSE"]
    expect:
      exit_code: 0
      stdout_contains:
        - "Content-Type: application/octet-stream"

  - name: missing files remain not found
    fixture: mime_site
    command: ["serve-file", "{fixture_path}/public", "/missing.json"]
    expect:
      exit_code: 0
      stdout_contains:
        - "HTTP/1.1 404 Not Found"
      stdout_not_contains:
        - "application/json"
