tests:
  - name: returns framed 200 for existing file
    fixture: site
    command: ["serve-file", "{fixture_path}/public", "/index.html"]
    expect:
      exit_code: 0
      stdout_contains:
        - "HTTP/1.1 200 OK"
        - "Content-Length: 15"
        - "hello tinyhttp"

  - name: returns empty framed 404 for missing file
    fixture: site
    command: ["serve-file", "{fixture_path}/public", "/missing.html"]
    expect:
      exit_code: 0
      stdout_contains:
        - "HTTP/1.1 404 Not Found"
        - "Content-Length: 0"
      stdout_not_contains:
        - "hello tinyhttp"

  - name: content length counts utf8 bytes
    fixture: site
    command: ["serve-file", "{fixture_path}/public", "/unicode.txt"]
    expect:
      exit_code: 0
      stdout_contains:
        - "Content-Length: 6"
        - "café"
