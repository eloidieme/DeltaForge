tests:
  - name: http11 defaults to keep alive
    stdin: "GET / HTTP/1.1\r\nHost: example.test\r\n\r\n"
    command: ["keep-alive"]
    expect:
      exit_code: 0
      stdout_exact: "keep-alive: true\n"

  - name: connection close disables keep alive
    stdin: "GET / HTTP/1.1\r\nConnection: close\r\n\r\n"
    command: ["keep-alive"]
    expect:
      exit_code: 0
      stdout_exact: "keep-alive: false\n"

  - name: http10 keep alive is explicit
    stdin: "GET / HTTP/1.0\r\nConnection: keep-alive\r\n\r\n"
    command: ["keep-alive"]
    expect:
      exit_code: 0
      stdout_exact: "keep-alive: true\n"

  - name: http10 defaults to close
    stdin: "GET / HTTP/1.0\r\nHost: example.test\r\n\r\n"
    command: ["keep-alive"]
    expect:
      exit_code: 0
      stdout_exact: "keep-alive: false\n"

  - name: connection matching is case insensitive
    stdin: "GET / HTTP/1.1\r\ncOnNeCtIoN: ClOsE\r\n\r\n"
    command: ["keep-alive"]
    expect:
      exit_code: 0
      stdout_exact: "keep-alive: false\n"
