tests:
  - name: returns inclusive partial content
    fixture: range_site
    command: ["range", "{fixture_path}/public", "/letters.txt", "2", "5"]
    expect:
      exit_code: 0
      stdout_contains:
        - "HTTP/1.1 206 Partial Content"
        - "Content-Range: bytes 2-5/11"
        - "Content-Length: 4"
        - "cdef"

  - name: returns one byte inclusive range
    fixture: range_site
    command: ["range", "{fixture_path}/public", "/letters.txt", "4", "4"]
    expect:
      exit_code: 0
      stdout_contains:
        - "Content-Range: bytes 4-4/11"
        - "Content-Length: 1"
        - "e"
