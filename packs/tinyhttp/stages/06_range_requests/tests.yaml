tests:
  - name: returns partial content
    fixture: range_site
    command: ["range", "{fixture_path}/public", "/letters.txt", "2", "5"]
    expect:
      exit_code: 0
      stdout_contains:
        - "HTTP/1.1 206 Partial Content"
        - "Content-Range: bytes 2-5/11"
        - "cdef"

  - name: rejects reversed range
    fixture: range_site
    command: ["range", "{fixture_path}/public", "/letters.txt", "7", "2"]
    expect:
      exit_code: 1
      stderr_contains:
        - "invalid range"

  - name: rejects out of bounds range
    fixture: range_site
    command: ["range", "{fixture_path}/public", "/letters.txt", "0", "99"]
    expect:
      exit_code: 1
      stderr_contains:
        - "invalid range"

  - name: returns a one byte inclusive range
    fixture: range_site
    command: ["range", "{fixture_path}/public", "/letters.txt", "4", "4"]
    expect:
      exit_code: 0
      stdout_contains:
        - "Content-Range: bytes 4-4/11"
        - "Content-Length: 1"
        - "e"

  - name: rejects non numeric offsets
    fixture: range_site
    command: ["range", "{fixture_path}/public", "/letters.txt", "first", "4"]
    expect:
      exit_code: 1
      stderr_contains:
        - "invalid range"

  - name: rejects range path traversal
    fixture: range_site
    command: ["range", "{fixture_path}/public", "/../secret.txt", "0", "1"]
    expect:
      exit_code: 1
      stderr_contains:
        - "unsafe path"
