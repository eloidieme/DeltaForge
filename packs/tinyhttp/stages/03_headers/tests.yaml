tests:
  - name: prints normalized headers in input order
    stdin: "GET / HTTP/1.1\r\nHost: example.test\r\nUser-Agent: DeltaForge\r\n\r\n"
    command: ["headers"]
    expect:
      exit_code: 0
      stdout_exact: |
        host: example.test
        user-agent: DeltaForge

  - name: trims header whitespace
    stdin: "GET / HTTP/1.1\r\nAccept:   text/plain  \r\n\r\n"
    command: ["headers"]
    expect:
      exit_code: 0
      stdout_exact: "accept: text/plain\n"

  - name: preserves header value case
    stdin: "GET / HTTP/1.1\r\nX-Mode: KeepThisCase\r\n\r\n"
    command: ["headers"]
    expect:
      exit_code: 0
      stdout_exact: "x-mode: KeepThisCase\n"
