tests:
  - name: ranks by coverage then density
    fixture: rank_project
    command: ["rank", "{fixture_path}", "alpha beta gamma"]
    expect:
      exit_code: 0
      stdout_exact: |
        1. src/three.rs (matched 3/3 tokens, 3 occurrences)
        2. src/two_hi.rs (matched 2/3 tokens, 3 occurrences)
        3. src/two_lo.rs (matched 2/3 tokens, 2 occurrences)
        4. src/one.rs (matched 1/3 tokens, 1 occurrences)

  - name: token absent from every file prints nothing
    fixture: rank_project
    command: ["rank", "{fixture_path}", "nonexistent_token"]
    expect:
      exit_code: 0
      stdout_exact: ""

  - name: empty query is an error
    fixture: rank_project
    command: ["rank", "{fixture_path}", ""]
    expect:
      exit_code: 1
      stdout_exact: ""
      stderr_contains:
        - "non-empty query"

  - name: repeated query tokens count once
    fixture: rank_project
    command: ["rank", "{fixture_path}", "alpha alpha"]
    expect:
      exit_code: 0
      stdout_contains:
        - "matched 1/1 tokens"

  - name: ranking uses exact case sensitive tokens
    fixture: rank_project
    command: ["rank", "{fixture_path}", "Alpha"]
    expect:
      exit_code: 0
      stdout_exact: ""

  - name: whitespace only query is rejected
    fixture: rank_project
    command: ["rank", "{fixture_path}", "   "]
    expect:
      exit_code: 1
      stdout_exact: ""
      stderr_contains:
        - "non-empty query"

  - name: highest occurrence count wins a duplicate token query
    fixture: rank_project
    command: ["rank", "{fixture_path}", "alpha alpha"]
    expect:
      exit_code: 0
      regex_match:
        - "(?m)^1\\. src/two_hi\\.rs \\(matched 1/1 tokens, 2 occurrences\\)$"
      stdout_not_contains:
        - "1/2 tokens"

  - name: files without any query token are absent
    fixture: rank_project
    command: ["rank", "{fixture_path}", "gamma"]
    expect:
      exit_code: 0
      stdout_exact: |
        1. src/three.rs (matched 1/1 tokens, 1 occurrences)
