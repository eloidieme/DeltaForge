tests:
  - name: deduplicates repeated file entries
    fixture: index_project
    command: ["index", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_not_contains:
        - "beta src/a.rs src/a.rs"

  - name: token and path ordering is canonical
    fixture: index_project
    command: ["index", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: |
        alpha src/a.rs src/b.rs
        beta src/a.rs
        fn src/a.rs src/b.rs
        gamma src/b.rs
        let src/a.rs src/b.rs

  - name: empty source corpus prints nothing
    fixture: empty_index
    command: ["index", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: ""
