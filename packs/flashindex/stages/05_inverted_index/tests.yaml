tests:
  - name: builds token to file mapping
    fixture: index_project
    command: ["index", "{fixture_path}"]
    expect:
      exit_code: 0
      regex_match:
        - "(?m)^alpha (src/a\\.rs src/b\\.rs|src/b\\.rs src/a\\.rs)$"
      stdout_contains:
        - "beta src/a.rs"
        - "gamma src/b.rs"

  - name: keeps output searchable by line
    fixture: index_project
    command: ["index", "{fixture_path}"]
    expect:
      exit_code: 0
      regex_match:
        - "(?m)^alpha .*src/a\\.rs"
        - "(?m)^alpha .*src/b\\.rs"

  - name: preserves case and underscores in tokens
    fixture: token_variety
    command: ["index", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_contains:
        - "Value src/v.rs"
        - "value src/v.rs"
        - "_value src/v.rs"

  - name: every line is one token followed by its paths
    fixture: index_project
    command: ["index", "{fixture_path}"]
    expect:
      exit_code: 0
      regex_match:
        - "\\A(?:\\S+(?: \\S+)+\\n)*\\z"
