tests:
  - name: includes source-like files
    fixture: mixed_files
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_contains:
        - "README.md"
        - "cmake/toolchain.cmake"
        - "include/search.hpp"
        - "notes.txt"
        - "scripts/generate.py"
        - "src/main.rs"
        - "src/search.cpp"

  - name: excludes unrelated assets
    fixture: mixed_files
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_not_contains:
        - "assets/logo.png"
        - "assets/table.csv"
        - "src/generated.bin"

  - name: ignores binary-looking files
    fixture: binaryish_files
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_contains:
        - "src/readable.txt"
      stdout_not_contains:
        - "data/blob.bin"
        - "data/archive.dat"

  - name: source files inside ignored directories stay excluded
    fixture: mixed_files
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_not_contains:
        - "target/generated.rs"

  - name: accepts every allowed extension
    fixture: allowed_extensions
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: |
        a.c
        b.cpp
        c.h
        d.hpp
        e.rs
        f.py
        g.md
        h.txt
        i.cmake

  - name: extension matching is case sensitive
    fixture: tricky_names
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_contains:
        - "src/main.rs"
      stdout_not_contains:
        - "NOTES.RS"
        - "readme.MD"

  - name: names without an allowed suffix are excluded
    fixture: tricky_names
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: |
        src/main.rs
      stdout_not_contains:
        - "Makefile"
        - "notes.rs.bak"
