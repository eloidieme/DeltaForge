tests:
  - name: tokenizes simple Rust identifiers
    fixture: simple_tokens
    command: ["tokenize", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_contains:
        - "src/main.rs:1:1 fn"
        - "src/main.rs:1:4 main"
        - "src/main.rs:2:9 fetch_or"
        - "src/main.rs:2:20 value_32"

  - name: ignores punctuation while preserving underscores
    fixture: punctuation_project
    command: ["tokenize", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_contains:
        - "src/flags.cpp:1:5 main"
        - "src/flags.cpp:2:8 uint32_t"
        - "src/flags.cpp:3:10 memory_order_relaxed"
      stdout_not_contains:
        - "::"
        - ";"
        - "("

  - name: tokenizes nested source files in stable relative paths
    fixture: nested_sources
    command: ["tokenize", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_contains:
        - "src/lib.rs:1:5 alpha"
        - "src/nested/mod.rs:1:5 beta_token"

  - name: skips leading digits and preserves actual columns
    fixture: edge_tokens
    command: ["tokenize", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: |
        src/digits.rs:1:4 alpha
        src/digits.rs:1:11 _beta2

  - name: empty source file produces no occurrences
    fixture: empty_source
    command: ["tokenize", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: ""

  - name: last token is emitted without a trailing newline
    fixture: no_trailing_newline
    command: ["tokenize", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: |
        src/tail.rs:1:1 alpha
        src/tail.rs:1:7 beta

  - name: columns count bytes and lone underscore is a token
    fixture: byte_columns
    command: ["tokenize", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: |
        src/unicode.rs:1:1 let
        src/unicode.rs:1:7 _x
        src/unicode.rs:2:1 _

  - name: carriage return line endings keep one based positions
    fixture: crlf_lines
    command: ["tokenize", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_contains:
        - "src/win.rs:1:1 alpha"
        - "src/win.rs:2:1 beta"
        - "src/win.rs:2:6 gamma"

  - name: files are processed in sorted portable path order
    fixture: two_files_order
    command: ["tokenize", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: |
        src/a.rs:1:1 one
        src/b.rs:1:1 two
