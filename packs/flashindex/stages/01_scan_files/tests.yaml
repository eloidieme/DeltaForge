tests:
  - name: scans files in a basic project
    fixture: basic_project
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_contains:
        - "README.md"
        - "src/main.rs"

  - name: scans nested directories
    fixture: nested_project
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_contains:
        - "src/main.rs"
        - "src/lib.rs"
        - "crates/core/src/index.rs"

  - name: prints paths in stable lexical order
    fixture: nested_project
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: |
        crates/core/src/index.rs
        src/lib.rs
        src/main.rs

  - name: skips ignored directories
    fixture: ignored_dirs
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_contains:
        - "src/main.rs"
      stdout_not_contains:
        - "target/debug/cache.o"
        - "build/output.o"
        - "node_modules/pkg/index.js"

  - name: ignored only tree produces empty output
    fixture: ignored_only
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: ""

  - name: deeply nested file stays root relative with forward slashes
    fixture: deep_paths
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: |
        a/b/c/d/deep.rs
      stdout_not_contains:
        - "\\"

  - name: ignored directories are skipped at any depth
    fixture: nested_ignored
    command: ["scan", "{fixture_path}"]
    expect:
      exit_code: 0
      stdout_exact: |
        src/deep/keep.rs
        src/lib.rs

  - name: missing root is an error
    fixture: basic_project
    command: ["scan", "{fixture_path}/does_not_exist"]
    expect:
      exit_code: 1
      stdout_exact: ""
