tests:
  - name: one thread preserves canonical output
    fixture: parallel_project
    command: ["index", "{fixture_path}", "--threads", "1"]
    expect:
      exit_code: 0
      stdout_exact: |
        Gamma lib/core.rs
        alpha src/a.rs src/b.rs
        beta src/a.rs src/b.rs
        delta src/b.rs
        fn lib/core.rs src/a.rs src/b.rs
        gamma lib/core.rs src/a.rs
        let src/a.rs src/b.rs
        struct lib/core.rs

  - name: eight threads preserve canonical output
    fixture: parallel_project
    command: ["index", "{fixture_path}", "--threads", "8"]
    expect:
      exit_code: 0
      stdout_exact: |
        Gamma lib/core.rs
        alpha src/a.rs src/b.rs
        beta src/a.rs src/b.rs
        delta src/b.rs
        fn lib/core.rs src/a.rs src/b.rs
        gamma lib/core.rs src/a.rs
        let src/a.rs src/b.rs
        struct lib/core.rs
