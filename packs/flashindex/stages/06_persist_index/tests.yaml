tests:
  - name: writes persisted index file
    fixture: persist_project
    command: ["index", "{fixture_path}", "--out", "{temp_dir}/index.fi"]
    expect:
      exit_code: 0
      stdout_contains:
        - "wrote"
      file_exists:
        - "{temp_dir}/index.fi"

  - name: persisted index contains token data
    fixture: persist_project
    command: ["index", "{fixture_path}", "--out", "{temp_dir}/index.fi"]
    expect:
      exit_code: 0
      file_contains:
        - path: "{temp_dir}/index.fi"
          contains: "durable_token"

  - name: creates nested output parents
    fixture: persist_project
    command: ["index", "{fixture_path}", "--out", "{temp_dir}/cache/nested/index.fi"]
    expect:
      exit_code: 0
      file_exists:
        - "{temp_dir}/cache/nested/index.fi"

  - name: rebuilding replaces a stale index artifact
    fixture: stale_index
    command: ["index", "{fixture_path}/project", "--out", "{fixture_path}/index.fi"]
    expect:
      exit_code: 0
      file_contains:
        - path: "{temp_dir}/fixture/index.fi"
          contains: "fresh_token"
      file_not_contains:
        - path: "{temp_dir}/fixture/index.fi"
          contains: "stale_token"

  - name: empty corpus still creates an artifact
    fixture: empty_project
    command: ["index", "{fixture_path}", "--out", "{temp_dir}/empty.fi"]
    expect:
      exit_code: 0
      file_exists:
        - "{temp_dir}/empty.fi"
