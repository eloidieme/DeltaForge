tests:
  - name: writes persisted index file
    fixture: persist_project
    command: ["index", "{fixture_path}", "--out", "{temp_dir}/index.fi"]
    expect:
      exit_code: 0
      file_exists:
        - "{temp_dir}/index.fi"

  - name: persisted index contains token data
    fixture: persist_project
    command: ["index", "{fixture_path}", "--out", "{temp_dir}/index.fi"]
    expect:
      exit_code: 0
      file_exists:
        - "{temp_dir}/index.fi"
      stdout_contains:
        - "wrote"

  - name: query reads persisted index
    fixture: persisted_query
    command: ["query", "{fixture_path}/index.fi", "durable_token"]
    expect:
      exit_code: 0
      stdout_contains:
        - "src/main.rs"

  - name: creates nested output parents
    fixture: persist_project
    command: ["index", "{fixture_path}", "--out", "{temp_dir}/cache/nested/index.fi"]
    expect:
      exit_code: 0
      file_exists:
        - "{temp_dir}/cache/nested/index.fi"

  - name: missing persisted token is empty success
    fixture: persisted_query
    command: ["query", "{fixture_path}/index.fi", "absent_token"]
    expect:
      exit_code: 0
      stdout_exact: ""

  - name: query returns sorted deduplicated paths
    fixture: persisted_query
    command: ["query", "{fixture_path}/index.fi", "shared_token"]
    expect:
      exit_code: 0
      stdout_exact: |
        src/a.rs
        src/b.rs

  - name: rebuilding replaces a stale index artifact
    fixture: stale_index
    command: ["index", "{fixture_path}/project", "--out", "{fixture_path}/index.fi"]
    expect:
      exit_code: 0
      file_contains:
        - path: "{temp_dir}/fixture/index.fi"
          contains: "fresh_token"
